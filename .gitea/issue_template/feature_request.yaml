name: Feature request
about: Idea for an improvement or new feature
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Before you type — podcast-to-youtube is deliberately scoped to
        **local-first Mac Silicon**:

        - **no** cloud transcription, no cloud LLM
        - **no** Linux/Windows-only paths in the supported flow
        - **WebGUI** is FastAPI + HTMX + Jinja2 — no SPA framework
        - **Network** only for the YouTube upload step

        If your proposal needs a different stack/platform/connectivity model
        it'll likely be declined — open it honestly anyway, we can talk.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's awkward or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you implement it? CLI signature, config knob, WebGUI sketch, phase placement — whatever helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Which other paths did you consider?
  - type: dropdown
    id: scope
    attributes:
      label: What's affected?
      multiple: true
      options:
        - CLI commands
        - WebGUI (FastAPI / HTMX)
        - Phase 1 — transcription (WhisperX)
        - Phase 2 — metadata (MLX LLM, prompts)
        - Phase 3 — video render (Remotion templates)
        - Phase 4 — YouTube upload
        - Pipeline orchestration / state
        - Documentation
        - Tests
        - Other
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I checked [existing issues](https://codeberg.org/jkaindl/podcast-to-youtube/issues) for duplicates.
          required: true
        - label: I understand the local-first / Mac-only platform stance.
          required: true
