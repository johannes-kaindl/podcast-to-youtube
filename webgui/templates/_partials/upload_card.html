<section class="upload-card">
  <div style="min-width:0;">
    <div class="caps" style="color: var(--accent);">↑ Final phase — upload to YouTube</div>
    <div class="meta-title" style="margin-top: 8px;">
      {{ state.phases.meta.title | default(stem) }}
    </div>
    <div class="mono dim" style="margin-top: 6px; font-size: 11px;">
      Channel · {{ state.config.show_name | default("—") }}
      &nbsp;·&nbsp; {{ state.phases.render.size_mb | default("—") }} MB
    </div>

    <div class="privacy" style="margin-top: 16px;">
      <span class="caps" style="margin-right: 12px;">Visibility</span>
      <div class="segmented" role="radiogroup" id="upload-privacy">
        <label><input type="radio" name="vis" value="private" checked><span>Private</span></label>
        <label><input type="radio" name="vis" value="unlisted"><span>Unlisted</span></label>
        <label aria-disabled="true" style="opacity:0.5; cursor: not-allowed;"><input type="radio" name="vis" value="public" disabled><span>Public</span></label>
      </div>
    </div>
    <p class="mono" style="margin-top: 12px; font-size: 11px; color: var(--fg-tertiary);">
      Public is disabled at the application level. Flip it from YouTube Studio after upload.
    </p>
  </div>
  <div class="stack-3" style="align-self: stretch; justify-content: center;">
    <button class="btn btn--primary btn--lg" id="upload-btn" type="button">
      <span style="font-family: monospace;">↑</span>
      <span>Upload to YouTube</span>
    </button>
    <button class="btn btn--ghost btn--sm" id="skip-upload-btn" type="button">Skip upload · keep local</button>
  </div>
</section>
